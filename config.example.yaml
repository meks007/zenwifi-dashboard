# Zenwifi Dashboard Configuration Example
# Copy this file to config.yaml and adjust to your environment.

mqtt:
  host: 192.168.1.10
  port: 1883
  username: myuser
  password: mypassword
  topic_prefix: zenwifi

# How often (in seconds) to poll all access points for connected clients.
# Polling involves multiple SSH commands per AP, so keep this sane (>=30 recommended).
polling_interval_seconds: 30

# Size of the in-memory log ring buffer (number of log lines kept).
# Older entries are dropped when the buffer is full. Default: 500.
log_buffer_size: 500

# Set to true to log every SSH command and its output (very verbose).
debug_logging: false

access_points:
  # Mark exactly one AP as master: true. The master node maintains
  # /tmp/clientlist.json which is the primary source for client IPs and
  # RSSI values across all nodes. On ASUS AiMesh, this is the main router.
  - name: "Living Room"
    host: 192.168.1.1
    ssh_port: 22
    username: admin
    password: secret
    master: true
    # driver: broadcom   # optional override; auto-detected if omitted

  - name: "Office"
    host: 192.168.1.2
    ssh_port: 22
    username: admin
    password: secret
    # driver: broadcom

  # Example: Atheros-based node (e.g. ZenWifi AC Mini with stock ASUS firmware)
  # Driver is auto-detected via SSH probe; override only if detection fails.
  - name: "Bedroom"
    host: 192.168.1.3
    ssh_port: 22
    username: admin
    password: secret
    # driver: atheros

# ---------------------------------------------------------------------------
# OPNsense DHCP integration (optional)
# ---------------------------------------------------------------------------
# When configured, the backend queries your OPNsense router's REST API on
# every poll cycle to retrieve DHCP leases and static mappings (reservations).
# Each WiFi client is then enriched with a 'dhcp' field containing:
#   ip, hostname, description, leaseEnds, leaseType, hasReservation
#
# API credentials: System -> Access -> Users -> <user> -> API keys
# Required privilege: DHCP: Leases (read-only is sufficient)
#
# Remove this block or leave host empty to disable DHCP enrichment.
# ---------------------------------------------------------------------------
opnsense:
  host: 192.168.1.1       # OPNsense IP or hostname (same host as your gateway)
  port: 443               # HTTPS port (default: 443)
  apiKey: your-api-key
  apiSecret: your-api-secret
  verifySsl: false        # Set to true if OPNsense has a valid/trusted TLS certificate
  pollInterval: 60        # How often (seconds) to refresh DHCP data from OPNsense
